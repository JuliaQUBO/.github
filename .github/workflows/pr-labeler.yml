name: Label Pull Requests

on:
  workflow_call:
    inputs:
      configuration_path:
        description: Path to the caller repository labeler configuration.
        required: false
        default: .github/labeler.yml
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply path-based PR labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ github.token }}
          sync-labels: false
          configuration-path: ${{ inputs.configuration_path }}
