name: Sync Shared Labels

on:
  workflow_call:
    inputs:
      dry_run:
        description: Preview label changes without applying them.
        required: false
        default: false
        type: boolean
      repository:
        description: Repository to sync. Defaults to the caller repository.
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview label changes without applying them.
        required: false
        default: false
        type: boolean
      repository:
        description: Repository to sync. Defaults to the current repository.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout shared automation repository
        uses: actions/checkout@v4
        with:
          repository: JuliaQUBO/.github
          ref: main
          path: shared

      - name: Sync labels
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
          LABELS_FILE: shared/.github/labels/shared-labels.json
        run: |
          bash shared/.github/scripts/sync-labels.sh
