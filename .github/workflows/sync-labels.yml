name: Sync Shared Labels

on:
  workflow_call:
    inputs:
      dry_run:
        description: Preview label changes without applying them.
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview label changes without applying them.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Derive shared automation ref
        id: workflow_ref
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          FALLBACK_REF: ${{ github.sha }}
        run: |
          if [[ -n "${WORKFLOW_REF}" ]]; then
            echo "ref=${WORKFLOW_REF##*@}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${FALLBACK_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout shared automation repository
        uses: actions/checkout@v4
        with:
          repository: JuliaQUBO/.github
          ref: ${{ steps.workflow_ref.outputs.ref }}
          path: shared

      - name: Sync labels
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run }}
          LABELS_FILE: shared/.github/labels/shared-labels.json
        run: |
          bash shared/.github/scripts/sync-labels.sh
