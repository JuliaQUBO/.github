name: Bug report
description: Report incorrect or broken behavior.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible bugs and regressions.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the incorrect behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      description: Registered version, branch, or commit SHA.
      placeholder: e.g. QUBO v0.3.2 on Julia 1.11
